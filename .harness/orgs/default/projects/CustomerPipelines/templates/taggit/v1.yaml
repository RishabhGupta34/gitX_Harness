template:
  name: taggit
  type: Pipeline
  projectIdentifier: CustomerPipelines
  orgIdentifier: default
  spec:
    stages:
      - stage:
          name: shel
          identifier: shel
          description: jj
          type: Custom
          sendGitStatus:
            enabled: true
            name: hello
          spec:
            execution:
              steps:
                - step:
                    type: Http
                    name: Http_1
                    identifier: Http_1
                    spec:
                      url: https://www.google.com
                      method: GET
                      headers: []
                      inputVariables: []
                      outputVariables: []
                      delegateSelectors:
                        - localdelegate
                    timeout: 10m
                - step:
                    type: ShellScript
                    name: ShellScript_1
                    identifier: ShellScript_1
                    spec:
                      shell: Bash
                      executionTarget: {}
                      source:
                        type: Inline
                        spec:
                          script: |-
                            echo "HEllo this is a simple script"

                            mv /harness /tmp/harness

                            echo "Done"

                            echo <+pipeline.name>
                            echo <+secrets.getValue("test")>
                      environmentVariables:
                        - name: env
                          type: String
                          value: a,b
                      outputVariables: []
                    timeout: 10m
          tags: {}
      - stage:
          name: l
          identifier: l
          tags: {}
          template:
            templateRef: cdstageTemp
            versionLabel: v1
            templateInputs:
              type: Deployment
              variables:
                - name: var1Default
                  type: String
                  default: "24e42"
                  value: <+input>.default(24e42)
                - name: var2Default
                  type: String
                  default: "+123"
                  value: <+input>.default(+123)
                - name: var3Default
                  type: String
                  default: "+12.44"
                  value: <+input>.default(+12.44)
                - name: var4
                  type: String
                  value: <+input>.executionInput()
                - name: var5
                  type: String
                  value: <+input>.executionInput()
                - name: var6
                  type: String
                  value: <+input>.executionInput()
                - name: var7
                  type: String
                  value: <+input>
                - name: var8
                  type: String
                  value: <+input>
                - name: var9
                  type: String
                  value: <+input>
  versionLabel: v1
  identifier: taggit
