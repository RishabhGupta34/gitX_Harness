template:
  name: cistagetmp
  type: Stage
  projectIdentifier: rishabh
  orgIdentifier: default
  spec:
    type: CI
    spec:
      cloneCodebase: false
      caching:
        enabled: true
        override: true
      buildIntelligence:
        enabled: true
      execution:
        steps:
          - step:
              name: runstpaccountt
              identifier: runstpaccountt
              template:
                templateRef: account.runstpaccount
                versionLabel: v2
                gitBranch: main
                templateInputs:
                  type: Run
                  spec:
                    image: <+input>.default(harness/todolist-sample).selectOneFrom(library/nginx,harness/todolist-sample)
          - step:
              name: rnustep
              identifier: rnustep
              template:
                templateRef: runstp
                versionLabel: v1
                gitBranch: main
                templateInputs:
                  type: Run
                  spec:
                    image: <+input>.default(harness/todolist-sample).selectOneFrom(library/nginx,harness/todolist-sample)
      infrastructure:
        type: KubernetesDirect
        spec:
          connectorRef: ciplay
          namespace: harness-delegate-ng
          automountServiceAccountToken: true
          nodeSelector: {}
          os: Linux
  identifier: cistagetmp
  versionLabel: v1
