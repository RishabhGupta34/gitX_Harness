template:
  name: cistagetmp
  type: Stage
  projectIdentifier: rishabh
  orgIdentifier: default
  spec:
    type: CI
    spec:
      cloneCodebase: false
      caching:
        enabled: true
        override: true
      buildIntelligence:
        enabled: true
      infrastructure:
        type: KubernetesDirect
        spec:
          connectorRef: k8sdelegate
          namespace: harness-delegate-ng
          automountServiceAccountToken: true
          nodeSelector: {}
          os: Linux
      execution:
        steps:
          - step:
              type: Run
              name: Run_1
              identifier: Run_1
              spec:
                connectorRef: account.harnessImage
                image: <+input>.default(harness/todolist-sample).selectOneFrom(library/nginx,harness/todolist-sample)
                shell: Sh
                command: echo 1
  identifier: cistagetmp
  versionLabel: v1
