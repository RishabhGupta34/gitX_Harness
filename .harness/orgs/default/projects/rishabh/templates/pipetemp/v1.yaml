template:
  name: pipe-temp
  type: Pipeline
  projectIdentifier: rishabh
  orgIdentifier: default
  spec:
    stages:
      - stage:
          name: ci
          identifier: ci
          template:
            templateRef: cistagetmp
            versionLabel: v1
            gitBranch: main
            templateInputs:
              type: CI
              spec:
                execution:
                  steps:
                    - step:
                        identifier: rnustep
                        template:
                          templateInputs:
                            type: Run
                            spec:
                              image: <+input>.default(harness/todolist-sample).selectOneFrom(library/nginx,harness/todolist-sample)
    delegateSelectors:
      - kubernetes-delegate
  identifier: pipetemp
  versionLabel: v1
