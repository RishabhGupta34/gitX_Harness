template:
  name: pipe-temp
  type: Pipeline
  projectIdentifier: rishabh
  orgIdentifier: default
  spec:
    stages:
      - stage:
          name: ci
          identifier: ci
          template:
            templateRef: cistagetmp
            versionLabel: v1
            gitBranch: main
            templateInputs:
              type: CI
              spec:
                execution:
                  steps:
                    - step:
                        identifier: rnustep
                        template:
                          templateInputs:
                            type: Run
                            spec:
                              image: <+input>.default(harness/todolist-sample).selectOneFrom(library/nginx,harness/todolist-sample)
      - stage:
          name: custom
          identifier: custom
          description: ""
          type: Custom
          spec:
            execution:
              steps:
                - step:
                    type: ShellScript
                    name: ShellScript_1
                    identifier: ShellScript_1
                    spec:
                      shell: Bash
                      executionTarget: {}
                      source:
                        type: Inline
                        spec:
                          script: echo 1
                      environmentVariables: []
                      outputVariables: []
                      delegateSelectors:
                        - kubernetes-delegate
                    timeout: 10m
                - stepGroup:
                    name: stg
                    identifier: stg
                    template:
                      templateRef: org.customstg
                      versionLabel: v1
          tags: {}
          when:
            pipelineStatus: Success
    delegateSelectors:
      - kubernetes-delegate
  identifier: pipetemp
  versionLabel: v1
